version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AUTOSME_ENV=${AUTOSME_ENV:-production}
      - AUTOSME_API_KEY=${AUTOSME_API_KEY}
      - AUTOSME_CORS_ORIGINS=${AUTOSME_CORS_ORIGINS:-*}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/app.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
