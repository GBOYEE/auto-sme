version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=auto_sme
      - POSTGRES_PASSWORD=auto_sme
      - POSTGRES_DB=auto_sme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_sme"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AUTOSME_ENV=${AUTOSME_ENV:-production}
      - AUTOSME_API_KEY=${AUTOSME_API_KEY}
      - AUTOSME_CORS_ORIGINS=${AUTOSME_CORS_ORIGINS:-*}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://auto_sme:auto_sme@postgres/auto_sme}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
